<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Kidzopedia verification code</title>
</head>
<body style="margin:0;padding:0;background:#fff7f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fff7f0;padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:20px;border:1px solid #f0e6db;overflow:hidden;">
          <tr>
            <td style="padding:36px 40px 8px;text-align:center;">
              <h1 style="margin:0;font-size:24px;font-weight:700;color:#2b2018;">Kidzopedia</h1>
              <p style="margin:8px 0 0;font-size:14px;color:#8a7a6a;">Capture every moment, celebrate every milestone.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 40px 8px;text-align:center;">
              <p style="margin:0 0 6px;font-size:16px;color:#2b2018;">Confirm your email to finish creating your account.</p>
              <p style="margin:0;font-size:14px;color:#8a7a6a;">Enter this 6-digit verification code in the app:</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 40px 8px;text-align:center;">
              <div style="display:inline-block;padding:16px 28px;background:#fff1e6;border:1px solid #ffd9b8;border-radius:14px;font-size:34px;font-weight:700;letter-spacing:10px;color:#d2691e;">{{ .Token }}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 40px 36px;text-align:center;">
              <p style="margin:0;font-size:13px;color:#a89888;">This code expires in 1 hour. If you didn't request it, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
        <p style="margin:18px 0 0;font-size:12px;color:#bbab9b;">&copy; Kidzopedia</p>
      </td>
    </tr>
  </table>
</body>
</html>
